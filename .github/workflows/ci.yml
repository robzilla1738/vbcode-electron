name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cloud-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check out locked engine source
        run: |
          ENGINE_COMMIT="$(tr -d '[:space:]' < ENGINE_COMMIT)"
          test "${#ENGINE_COMMIT}" -eq 40
          git init vibe-codr
          git -C vibe-codr remote add origin https://github.com/robzilla1738/vibe-codr.git
          git -C vibe-codr fetch --depth=1 origin "$ENGINE_COMMIT"
          git -C vibe-codr checkout --detach FETCH_HEAD
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
      - name: Build pinned Linux cloud runtime
        working-directory: vibe-codr
        run: |
          bun install --frozen-lockfile
          VIBE_ENGINE_COMMIT="$(git rev-parse HEAD)" bun run build:cloud-runtime
          bun run smoke:cloud-runtime
      - name: Upload revision-keyed cloud runtime
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cloud-runtime
          path: vibe-codr/dist/cloud-runtime/vibe-cloud-runtime-*
          if-no-files-found: error

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check out locked engine source
        run: |
          ENGINE_COMMIT="$(tr -d '[:space:]' < ENGINE_COMMIT)"
          test "${#ENGINE_COMMIT}" -eq 40
          git init vibe-codr
          git -C vibe-codr remote add origin https://github.com/robzilla1738/vibe-codr.git
          git -C vibe-codr fetch --depth=1 origin "$ENGINE_COMMIT"
          git -C vibe-codr checkout --detach FETCH_HEAD
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - name: Build engine host
        working-directory: vibe-codr
        run: bun install --frozen-lockfile && bun run build:macos-bridge
      - run: npm ci
      - name: Verify source, types, tests, lint, and build
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
        run: npm run verify
      - name: Coverage floors (shared + bridge)
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
        run: npm run test:coverage
      - name: Host NDJSON bridge smoke
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
        run: npm run smoke:bridge
      - name: Install Electron runtime dependencies
        run: npx playwright install --with-deps chromium
      - name: Electron end-to-end tests
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
        run: xvfb-run -a npm run test:e2e

  packaged-smoke:
    needs: cloud-runtime
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check out locked engine source
        run: |
          ENGINE_COMMIT="$(tr -d '[:space:]' < ENGINE_COMMIT)"
          test "${#ENGINE_COMMIT}" -eq 40
          git init vibe-codr
          git -C vibe-codr remote add origin https://github.com/robzilla1738/vibe-codr.git
          git -C vibe-codr fetch --depth=1 origin "$ENGINE_COMMIT"
          git -C vibe-codr checkout --detach FETCH_HEAD
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - name: Build engine host
        working-directory: vibe-codr
        run: bun install --frozen-lockfile && bun run build:macos-bridge
      - run: npm ci
      - name: Download verified Linux cloud runtime
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cloud-runtime
          path: .artifacts/cloud-runtime
      - name: Build unsigned application bundle
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
          VIBE_CLOUD_RUNTIME_DIR: ${{ github.workspace }}/.artifacts/cloud-runtime
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run pack
      - name: Verify bundled host without developer checkout fallback
        env:
          VIBE_CODR_ROOT: ""
        run: npm run smoke:packaged

  windows-packaged-smoke:
    needs: cloud-runtime
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check out locked engine source
        shell: pwsh
        run: |
          $engineCommit = (Get-Content ENGINE_COMMIT -Raw).Trim()
          if ($engineCommit.Length -ne 40) { throw "invalid ENGINE_COMMIT" }
          git init vibe-codr
          git -C vibe-codr remote add origin https://github.com/robzilla1738/vibe-codr.git
          git -C vibe-codr fetch --depth=1 origin $engineCommit
          git -C vibe-codr checkout --detach FETCH_HEAD
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - name: Build Windows engine host
        working-directory: vibe-codr
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          bun run build:macos-bridge
          if (Test-Path dist/vibecodr-engine-host) {
            Move-Item dist/vibecodr-engine-host dist/vibecodr-engine-host.exe
          }
          if (!(Test-Path dist/vibecodr-engine-host.exe)) {
            throw "Windows engine host was not produced"
          }
      - run: npm ci
      - name: Download verified Linux cloud runtime
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cloud-runtime
          path: .artifacts/cloud-runtime
      - name: Build unsigned Windows application bundle
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}\vibe-codr
          VIBE_CLOUD_RUNTIME_DIR: ${{ github.workspace }}\.artifacts\cloud-runtime
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run pack:win
      - name: Verify bundled Windows host
        env:
          VIBE_CODR_ROOT: ""
        run: npm run smoke:packaged
      - name: Build and validate Windows installer update feed
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}\vibe-codr
          VIBE_CLOUD_RUNTIME_DIR: ${{ github.workspace }}\.artifacts\cloud-runtime
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run dist:win -- --config.forceCodeSigning=false
          $installer = @(Get-ChildItem release -File -Filter *.exe)
          if ($installer.Count -ne 1) { throw "Expected one NSIS installer" }
          if (!(Test-Path release/latest.yml)) { throw "Missing Windows update metadata" }
