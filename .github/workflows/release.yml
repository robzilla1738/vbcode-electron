name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    runs-on: macos-14
    timeout-minutes: 45
    environment: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Verify release version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
      - name: Check out locked engine source
        run: |
          ENGINE_COMMIT="$(tr -d '[:space:]' < ENGINE_COMMIT)"
          test "${#ENGINE_COMMIT}" -eq 40
          git init vibe-codr
          git -C vibe-codr remote add origin https://github.com/robzilla1738/vibe-codr.git
          git -C vibe-codr fetch --depth=1 origin "$ENGINE_COMMIT"
          git -C vibe-codr checkout --detach FETCH_HEAD
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - name: Build locked engine host
        working-directory: vibe-codr
        run: bun install --frozen-lockfile && bun run build:macos-bridge
      - run: npm ci
      - name: Verify release source
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
        run: npm run verify:ci
      - name: Prepare notarization API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          test -n "$APPLE_API_KEY_P8"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
      - name: Build, sign, and notarize DMG
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}/vibe-codr
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run dist:mac -- --config.mac.notarize=true
      - name: Notarize and staple disk image
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          DMG_PATH="$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" --key "$APPLE_API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$DMG_PATH"
      - name: Verify signed artifacts
        run: |
          APP_PATH="release/mac-arm64/Vibe Codr.app"
          DMG_PATH="$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
      - name: Stage macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-release
          path: release/*.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-2025
    timeout-minutes: 45
    environment: release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Verify release version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$version") { throw "tag/version mismatch" }
      - name: Check out locked engine source
        shell: pwsh
        run: |
          $engineCommit = (Get-Content ENGINE_COMMIT -Raw).Trim()
          if ($engineCommit.Length -ne 40) { throw "invalid ENGINE_COMMIT" }
          git init vibe-codr
          git -C vibe-codr remote add origin https://github.com/robzilla1738/vibe-codr.git
          git -C vibe-codr fetch --depth=1 origin $engineCommit
          git -C vibe-codr checkout --detach FETCH_HEAD
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - name: Build locked Windows engine host
        working-directory: vibe-codr
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          bun run build:macos-bridge
          if (Test-Path dist/vibecodr-engine-host) {
            Move-Item dist/vibecodr-engine-host dist/vibecodr-engine-host.exe
          }
          if (!(Test-Path dist/vibecodr-engine-host.exe)) {
            throw "Windows engine host was not produced"
          }
      - run: npm ci
      - name: Verify Windows source and runtime
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}\vibe-codr
        run: npm run verify && npm run smoke:bridge
      - name: Build and smoke unsigned Windows bundle
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}\vibe-codr
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run pack:win && npm run smoke:packaged
      - name: Build Microsoft Store package
        env:
          VIBE_CODR_ROOT: ${{ github.workspace }}\vibe-codr
        run: npm run dist:win
      - name: Validate and wrap Store upload
        run: npm run prepare:win:store
      - name: Stage Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-release
          path: |
            release/*.appx
            release/*.appxupload
          if-no-files-found: error

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Download signed artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: '*-release'
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        run: |
          cd release-assets
          sha256sum *.dmg > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/*.dmg release-assets/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/*.dmg release-assets/SHA256SUMS --verify-tag --generate-notes --title "Vibe Codr $GITHUB_REF_NAME"
          fi
