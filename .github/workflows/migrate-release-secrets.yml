name: Migrate release secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: release
    env:
      GH_TOKEN: ${{ secrets.MIGRATION_PAT }}
      TARGET_REPO: robzilla1738/vibe-codr
    steps:
      - name: Copy encrypted release values to the canonical repository
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          test -n "$GH_TOKEN"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_KEY_P8"
          test -n "$MAC_CSC_KEY_PASSWORD"
          test -n "$MAC_CSC_LINK"
          printf '%s' "$APPLE_API_ISSUER" | gh secret set APPLE_API_ISSUER --env release --repo "$TARGET_REPO"
          printf '%s' "$APPLE_API_KEY_ID" | gh secret set APPLE_API_KEY_ID --env release --repo "$TARGET_REPO"
          printf '%s' "$APPLE_API_KEY_P8" | gh secret set APPLE_API_KEY_P8 --env release --repo "$TARGET_REPO"
          printf '%s' "$MAC_CSC_KEY_PASSWORD" | gh secret set MAC_CSC_KEY_PASSWORD --env release --repo "$TARGET_REPO"
          printf '%s' "$MAC_CSC_LINK" | gh secret set MAC_CSC_LINK --env release --repo "$TARGET_REPO"
